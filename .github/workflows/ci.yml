name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lambda-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: scripts/cache-invalidation-lambda
        run: pip install -r requirements.txt

      - name: Run cache-invalidation Lambda tests
        working-directory: scripts/cache-invalidation-lambda
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -v

  terraform-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - name: terraform fmt -check (whole repo, runs once)
        run: terraform fmt -check -recursive
        working-directory: terraform

  terraform-validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        directory:
          - terraform/modules/networking
          - terraform/modules/security
          - terraform/modules/storage
          - terraform/modules/database
          - terraform/modules/cache
          - terraform/modules/compute
          - terraform/modules/cdn
          - terraform/modules/cache-invalidation
          - terraform/environments/example

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      # -backend=false since there's no real state bucket in CI; validates HCL syntax,
      # variable references, and provider schema usage without real AWS credentials.
      - name: terraform init
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate
